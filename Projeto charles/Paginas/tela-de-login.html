<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link rel="stylesheet" href="../Assets/estilo.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../Assets/script.js" defer></script> 
</head>
<body class="pagina-login">
    <header class="cabecalho">
        <div class="logo-container">
            <i class="bi bi-browser-edge edge-icon-header" style="margin-top: 4px;"></i>
            <span class="logo-text-header" style="margin-top: 2px; margin-bottom: 4px;">TeleCall</span>
        </div>
    </header>
    <div class="centralizar">
        <form class="login" id="form-login" novalidate>
            <label>
                <i class="bi bi-person" style="font-size: 35px;"></i>
                <input type="text" name="login" id="login" maxlength="6" placeholder="Digite seu Login">
            </label>
            <label>
                <i class="bi bi-lock" style="font-size: 35px;"></i>
                <input type="password" name="senha" id="senha" maxlength="8" placeholder="Digite sua Senha">
            </label><br>
                <div class="msgerrologin" style="display: none; color: red; font-weight: bold; text-align: center;">
                    <p></p>
                </div>
            <label>
                <button type="submit">ENVIAR</button>
            </label>
        </form>
        <button id="botao-novo-usuario">Cadastrar Novo Usuário</button>
    </div>
</body>
</html>
